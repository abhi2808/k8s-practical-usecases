apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  instanceProfile: "KarpenterNodeInstanceProfile-karpenter"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "karpenter"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "karpenter"
  tags:
    managed-by: karpenter
    cluster: "karpenter"
