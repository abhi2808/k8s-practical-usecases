config:
  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name    record_modifier
        Match   kube.*
        Record  awsAccount account-1
        Record  clusterName cluster-1

  outputs: |
    [OUTPUT]
        Name            loki
        Match           kube.*
        Host            13.201.56.208
        Port            3100
        Labels          job=fluent-bit
        Label_Keys      $awsAccount,$clusterName,$kubernetes['namespace_name'],$kubernetes['pod_name']
        line_format     json

