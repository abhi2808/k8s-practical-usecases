apiVersion: v1
data:
  mapRoles: |
    - rolearn: arn:aws:iam::185863138492:role/nlb-block-prac-app-node-role
      groups:
      - system:bootstrappers
      - system:nodes
      username: system:node:{{EC2PrivateDNSName}}
    - groups:
      - poc-developers
      rolearn: arn:aws:iam::185863138492:role/poc-developer-role
      username: poc-developer
    - groups:
      - poc-platform
      rolearn: arn:aws:iam::185863138492:role/poc-platform-role
      username: poc-platform
kind: ConfigMap
metadata:
  name: aws-auth
  namespace: kube-system